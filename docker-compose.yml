version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: code_review_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: codesentry
      POSTGRES_INITDB_ARGS: "--auth-host=md5 --auth-local=md5"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: zhazha/code-reviewer-aoi:latest
    container_name: codesentry_app
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - SERVER_MODE=release
      - DB_DRIVER=postgres
      - DB_DSN=host=db user=postgres password=123456 dbname=codesentry port=5432 sslmode=disable TimeZone=Asia/Shanghai
      - JWT_SECRET=your_jwt_secret_key_here
      # OpenAI Config
      - OPENAI_API_KEY=your_openai_api_key
      - OPENAI_BASE_URL=https://api.openai.com/v1
      - OPENAI_MODEL=gpt-4
    volumes:
      - ./data/app:/app/data
